
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
#app{background:#000;width:100%;height:700px;overflow:hidden;position:relative}
#p1{display:flex;align-items:center;justify-content:center;height:700px}
.dlg{border:3px solid #fff;padding:36px 32px 32px;text-align:center;position:relative;background:#000;max-width:300px;width:90%}
.dots{position:absolute;top:10px;left:12px;display:flex;gap:6px}
.dots i{width:9px;height:9px;border:2px solid #fff;display:block}
.q{font-family:'Press Start 2P',monospace;font-size:15px;color:#fff;margin:8px 0 28px;line-height:1.9}
.btns{display:flex;gap:20px;justify-content:center}
.by,.bn{font-family:'Press Start 2P',monospace;font-size:12px;padding:10px 22px;border:3px solid #fff;cursor:pointer;transition:transform .15s}
.by{background:#fff;color:#000}.by:hover{background:#eee}
.bn{background:#000;color:#fff;position:absolute}
#p2{display:none;height:700px;background:#000;position:relative;overflow:hidden}
#p2.on{display:block}
#hc{width:100%;height:100%}
</style>

<div id="app">
  <div id="p1">
    <div class="dlg">
      <div class="dots"><i></i><i></i><i></i></div>
      <div class="q">Do you love me?</div>
      <div class="btns">
        <button class="by" onclick="go2()">Yes</button>
        <button class="bn" id="no" onmouseover="flee()" ontouchstart="flee()">No</button>
      </div>
    </div>
  </div>
  <div id="p2">
    <canvas id="hc"></canvas>
  </div>
</div>

<script>
function flee(){
  var btn=document.getElementById('no');
  var app=document.getElementById('app');
  var r=app.getBoundingClientRect();
  btn.style.left=Math.random()*(r.width-90)+'px';
  btn.style.top=(180+Math.random()*350)+'px';
  btn.style.transition='left .25s,top .25s';
}

function go2(){
  document.getElementById('p1').style.display='none';
  var p2=document.getElementById('p2');
  p2.classList.add('on');
  setTimeout(startHeart,60);
}

function startHeart(){
  var cvs=document.getElementById('hc');
  var W=cvs.offsetWidth||380;
  var H=cvs.offsetHeight||700;
  cvs.width=W; cvs.height=H;
  var ctx=cvs.getContext('2d');

  var cx=W/2, cy=H/2-20;
  var scale=9.5;

  function hx(t){return cx+scale*16*Math.pow(Math.sin(t),3)}
  function hy(t){return cy-scale*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))}

  var N=80;
  var pts=[];
  for(var i=0;i<N;i++){
    var t=i/N*Math.PI*2;
    var sz=10+Math.floor(Math.random()*5);
    pts.push({
      tx:hx(t), ty:hy(t),
      x:cx+(Math.random()-0.5)*W*0.8,
      y:cy+(Math.random()-0.5)*H*0.5,
      alpha:0,
      delay:i*2+Math.random()*20,
      sz:sz,
      phase:Math.random()*Math.PI*2,
      spd:0.025+Math.random()*0.015
    });
  }

  var frame=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    frame++;
    var allDone=true;
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      if(frame<p.delay){allDone=false;continue}
      var ease=1-Math.pow(0.92,frame-p.delay);
      p.x=p.x+(p.tx-p.x)*0.06;
      p.y=p.y+(p.ty-p.y)*0.06;
      p.alpha=Math.min(1,p.alpha+0.022);
      var pulse=0.7+0.3*Math.sin(frame*p.spd+p.phase);
      var dist=Math.hypot(p.x-p.tx,p.y-p.ty);
      if(dist>1) allDone=false;
      ctx.save();
      ctx.globalAlpha=p.alpha*pulse;
      var t=frame*0.01+p.phase;
      var r=Math.floor(220+30*Math.sin(t));
      var g=Math.floor(80+40*Math.sin(t+1));
      var b=Math.floor(140+60*Math.sin(t+2));
      ctx.fillStyle='rgb('+r+','+g+','+b+')';
      ctx.font='bold '+p.sz+'px Georgia,serif';
      ctx.textAlign='center';
      ctx.fillText('I love you',p.x,p.y);
      ctx.restore();
    }
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
